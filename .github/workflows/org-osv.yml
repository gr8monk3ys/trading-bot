name: org-osv

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  osv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run OSV scanner
        id: osv_scan
        uses: google/osv-scanner-action/osv-scanner-action@8018483926dd235b3013d8c88023e644b9f8e09e # v2.3.3
        with:
          scan-args: |-
            --output=results.json
            --format=json
            --recursive
            ./
        continue-on-error: true

      - name: Build OSV SARIF report
        uses: google/osv-scanner-action/osv-reporter-action@8018483926dd235b3013d8c88023e644b9f8e09e # v2.3.3
        with:
          scan-args: |-
            --output=results.sarif
            --new=results.json
            --gh-annotations=false
            --fail-on-vuln=false

      - name: Upload OSV SARIF artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: osv-scan-sarif
          path: results.sarif
          retention-days: 5

      - name: Error troubleshooter
        if: ${{ always() && steps.osv_scan.outcome == 'failure' }}
        run: |
          echo "::warning::OSV scanner reported vulnerabilities or scan issues. Review the uploaded SARIF artifact for details."
